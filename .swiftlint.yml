# SwiftLint 配置 —— Status
# 门禁：swiftlint（见 scripts/gate.sh）

opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - last_where
  - operator_usage_whitespace
  - sorted_first_last
  - toggle_bool

disabled_rules:
  - trailing_whitespace
  - trailing_comma  # 由 SwiftFormat 统一管理逗号（SwiftFormat 默认保留尾逗号，与之冲突）
  - opening_brace   # 由 SwiftFormat 统一管理大括号布局
  - todo  # 开发期允许 TODO/FIXME，但须在 ROADMAP 登记

excluded:
  - .build
  - DerivedData
  - build
  - Packages

# AppKit/SwiftUI 壳与采集逻辑放宽一点，避免噪声遮蔽真问题
line_length:
  warning: 130
  error: 200

type_body_length:
  warning: 400
  error: 700

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 60
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  allowed_symbols: ["_"]
  min_length: 1
  max_length: 60

number_separator:
  minimum_length: 6
